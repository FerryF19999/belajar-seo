<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #f5f1ea; }
      .paper { fill: #faf7f1; stroke: #d9d0bf; stroke-width: 1; }
      .ink { fill: #1a1613; }
      .ink2 { fill: #4a4238; }
      .muted { fill: #857a6b; }
      .accent { fill: #c1432c; }
      .accent-soft { fill: #e86a52; }
      .line { stroke: #d9d0bf; stroke-width: 1; }
      .serif { font-family: 'Fraunces', Georgia, 'Times New Roman', serif; }
      .italic { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .sans { font-family: 'Inter', system-ui, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="630"/>

  <!-- decorative large accent letters in background -->
  <text x="1080" y="220" class="italic" font-size="280" fill="rgba(193,67,44,0.07)" text-anchor="middle">SEO</text>

  <!-- brand mark -->
  <rect x="60" y="54" width="56" height="56" rx="6" class="accent"/>
  <text x="88" y="97" class="italic" font-size="40" fill="#faf7f1" text-anchor="middle" font-weight="700">S</text>
  <text x="134" y="94" class="serif" font-size="24" font-weight="700">SEO</text>
  <text x="196" y="94" class="italic" font-size="24" class="accent" fill="#c1432c">Sekolah</text>

  <!-- eyebrow -->
  <line x1="60" y1="178" x2="100" y2="178" class="line" stroke="#857a6b" stroke-width="1.2"/>
  <text x="112" y="182" class="mono" font-size="16" fill="#857a6b" letter-spacing="3">KURIKULUM 2026 · PEMULA SAMPAI MAHIR</text>

  <!-- main title -->
  <text x="60" y="285" class="serif" font-size="92" font-weight="500" fill="#1a1613">Belajar SEO</text>
  <text x="60" y="380" class="serif" font-size="92" font-weight="500" fill="#1a1613">dari <tspan class="italic" fill="#c1432c" font-weight="400">nol</tspan>, sampai</text>
  <text x="60" y="475" class="serif" font-size="92" font-weight="500" fill="#1a1613">halaman <tspan class="italic" fill="#c1432c" font-weight="400">pertama</tspan>.</text>

  <!-- stat pills -->
  <g transform="translate(60, 520)">
    <rect width="190" height="42" rx="2" class="paper"/>
    <text x="95" y="28" class="mono" font-size="13" fill="#1a1613" text-anchor="middle" letter-spacing="1.5">16 BAB LENGKAP</text>

    <rect x="202" width="232" height="42" rx="2" class="paper"/>
    <text x="318" y="28" class="mono" font-size="13" fill="#1a1613" text-anchor="middle" letter-spacing="1.5">10 SIMULATOR + ALAT</text>

    <rect x="446" width="260" height="42" rx="2" class="paper"/>
    <text x="576" y="28" class="mono" font-size="13" fill="#1a1613" text-anchor="middle" letter-spacing="1.5">ROADMAP 10 FASE</text>

    <rect x="718" width="130" height="42" rx="2" fill="#1a1613"/>
    <text x="783" y="28" class="mono" font-size="13" fill="#faf7f1" text-anchor="middle" letter-spacing="1.5">GRATIS</text>
  </g>

  <!-- footer line -->
  <line x1="60" y1="598" x2="1140" y2="598" class="line"/>
  <text x="60" y="594" class="sans" font-size="14" fill="#857a6b">Ditulis oleh Muhammad Ferry</text>
  <text x="1140" y="594" class="mono" font-size="13" fill="#857a6b" text-anchor="end" letter-spacing="1">belajar-seo.vercel.app</text>
</svg>
